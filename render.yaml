services:
  - type: web
    name: mailcheck-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn server:app --bind 0.0.0.0:$PORT --timeout 180 --workers 1 --threads 2 --log-level info
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
    healthCheckPath: /health
